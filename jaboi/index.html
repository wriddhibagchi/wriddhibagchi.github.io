<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jaboi — AI Travel Planner for India</title>

  <meta property="og:title"       content="Jaboi — AI Travel Planner for India" />
  <meta property="og:description" content="Plan your perfect Indian trip in seconds with AI-generated itineraries, real places and cost estimates." />
  <meta property="og:image"       content="https://wriddhibagchi.github.io/jaboi/preview.png" />
  <meta property="og:url"         content="https://wriddhibagchi.github.io/jaboi/" />
  <meta name="twitter:card"       content="summary_large_image" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-card:     #0F172A;
      --lavender:    #C4B5FD;
      --border:      rgba(255,255,255,0.10);
      --text-dim:    rgba(255,255,255,0.55);
      --text-dimmer: rgba(255,255,255,0.35);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height: 100vh;
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #0F172A 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px 48px;
      color: #fff;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(14,165,233,.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 80% 80%, rgba(99,102,241,.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .wrapper {
      position: relative;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeUp .6s ease both;
    }

    /* ── Logo — full-res transparent PNG, rendered at 160px ───── */
    .logo-wrap {
      width: 160px;
      height: 160px;
      margin-bottom: 4px;
      filter: drop-shadow(0 6px 24px rgba(14,165,233,.3));
    }
    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      /* browser renders at display size, full res asset = crisp */
      image-rendering: -webkit-optimize-contrast;
    }

    .subtitle {
      font-size: 13px;
      font-weight: 600;
      color: var(--lavender);
      letter-spacing: .5px;
      margin-bottom: 22px;
    }

    /* ── Card ─────────────────────────────────────────────────── */
    .card {
      width: 100%;
      background: var(--bg-card);
      border-radius: 20px;
      border: 1px solid var(--border);
      padding: 28px 24px 24px;
      box-shadow:
        0 20px 60px rgba(0,0,0,.5),
        0 0 0 1px rgba(255,255,255,.04);
    }

    .card-title {
      font-size: 22px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 5px;
    }
    .card-sub {
      font-size: 12.5px;
      color: var(--text-dim);
      text-align: center;
      line-height: 1.5;
      margin-bottom: 22px;
    }

    /* ── Play Store button ────────────────────────────────────── */
    .btn-playstore {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px 24px;
      background: #fff;
      color: #1E293B;
      border: 1.5px solid #E2E8F0;
      border-radius: 14px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 2px 8px rgba(0,0,0,.18);
      transition: transform .12s ease, box-shadow .12s ease;
    }
    .btn-playstore:hover  { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(0,0,0,.28); }
    .btn-playstore:active { transform: scale(.98); }
    .play-icon { width: 26px; height: 26px; flex-shrink: 0; }

    .coming-soon {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 14px;
      font-size: 11px;
      color: var(--text-dimmer);
      text-align: center;
    }

    /* ── Feature row ──────────────────────────────────────────── */
    .features {
      display: flex;
      justify-content: space-evenly;
      width: 100%;
      margin-top: 22px;
    }
    .feature {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .feature-emoji { font-size: 26px; }
    .feature-label {
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      text-align: center;
    }

    /* ── Privacy note ─────────────────────────────────────────── */
    .privacy {
      width: 100%;
      margin-top: 18px;
      padding: 10px 14px;
      background: rgba(15,23,42,.5);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      display: flex;
      align-items: flex-start;
      gap: 9px;
    }
    .lock-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
    .privacy-text {
      font-size: 11px;
      color: rgba(255,255,255,.78);
      line-height: 1.5;
      min-width: 0;
      word-break: break-word;
    }
    .privacy-text a {
      color: var(--lavender);
      font-weight: 700;
      text-decoration: underline;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <!-- Logo references the file you upload to GitHub alongside this HTML -->
    <div class="logo-wrap">
      <img src="jaboi_logo.png" alt="Jaboi logo" />
    </div>

    <p class="subtitle">Your Travel Planner</p>

    <div class="card">
      <p class="card-title">Welcome</p>
      <p class="card-sub">Install Jaboi to start your personalized travel adventure</p>

      <a class="btn-playstore"
         href="https://play.google.com/store/apps/details?id=com.wriddhi.jaboi">
        <svg class="play-icon" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#00C6FF"/><stop offset="100%" stop-color="#0EA5E9"/>
            </linearGradient>
            <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#F7971E"/><stop offset="100%" stop-color="#FFD200"/>
            </linearGradient>
            <linearGradient id="g3" x1="0%" y1="100%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#FF416C"/><stop offset="100%" stop-color="#FF4B2B"/>
            </linearGradient>
            <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#56AB2F"/><stop offset="100%" stop-color="#A8E063"/>
            </linearGradient>
          </defs>
          <path d="M56 32 L256 232 L56 232 Z"   fill="url(#g1)"/>
          <path d="M56 32 L256 232 L456 132 Z"  fill="url(#g2)"/>
          <path d="M456 132 L256 232 L456 332 Z" fill="url(#g3)"/>
          <path d="M56 432 L256 232 L56 232 Z"   fill="url(#g4)"/>
          <path d="M56 432 L256 232 L456 332 Z"  fill="url(#g2)" opacity=".85"/>
        </svg>
        Get Jaboi on Play Store
      </a>

      <div class="coming-soon">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        Already installed? Open Jaboi and search for the destination
      </div>
    </div>

    <div class="features">
      <div class="feature">
        <span class="feature-emoji">🤖</span>
        <span class="feature-label">AI-Powered</span>
      </div>
      <div class="feature">
        <span class="feature-emoji">🇮🇳</span>
        <span class="feature-label">Indian Destinations</span>
      </div>
      <div class="feature">
        <span class="feature-emoji">✨</span>
        <span class="feature-label">Personalized</span>
      </div>
    </div>

    <div class="privacy">
      <span class="lock-icon">🔒</span>
      <span class="privacy-text">
        By using Jaboi, you agree to our
        <a href="https://wriddhibagchi.github.io/jaboi-privacy/privacy_policy"
           target="_blank" rel="noopener">Privacy Policy</a>
      </span>
    </div>

  </div>
</body>
</html>
